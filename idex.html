<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy Counter</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="counter">
        <h1 class="counter__title">Fancy Counter</h1>
        <span class="counter__value">0</span>
        <p class="counter__message" style="display: none;"></p>
        <button class="counter__reset-button">
            <i class="fa-solid fa-arrows-rotate counter__reset-icon"></i>
        </button>
        <div class="counter__buttons">
            <button class="counter__button counter__button--decrease">
                <i class="fa-solid fa-minus counter__icon counter__icon--minus"></i>
            </button>
                 <button class="counter__button counter__button--increase">
                <i class="fa-solid fa-plus counter__icon counter__icon--plus"></i>
            </button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
